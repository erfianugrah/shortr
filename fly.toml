# shortr — fly.toml
#
# Single-region by design. `fra` matches the user's other Fly apps
# (knot-fly-mvp, glory-hole) for co-located latency.
#
# Manual one-time setup:
#   flyctl apps create shortr-erfi
#   flyctl secrets set --app shortr-erfi ADMIN_TOKEN=$(openssl rand -hex 32)
#   flyctl secrets set --app shortr-erfi PUBLIC_BASE_URL=https://s.erfi.io
#   flyctl ips list --app shortr-erfi        # copy IPs into knotctl
#   flyctl certs add s.erfi.io --app shortr-erfi
#
# Disaster recovery: Fly takes a daily snapshot of the volume mounted at
# /data and retains them per snapshot_retention below. Restore with
# `flyctl volumes snapshots list -a shortr-erfi` then
# `flyctl volumes create --snapshot-id <id> --region fra shortr_data`.
# For a pre-risky-change snapshot use `make backup` from the repo root.
#
# Public hostname is s.erfi.io; "shortr-erfi" is just the Fly app slug
# (the unsuffixed "shortr" was already claimed globally).

app            = "shortr-erfi"
primary_region = "fra"

[build]
  dockerfile = "deploy/Dockerfile"
  # Build context is the repo root (parent of fly.toml). The Dockerfile
  # references the multi-stage layout starting from web/ + go module root.

[env]
  PORT            = "8080"
  DB_PATH         = "/data/shortr.db"
  LOG_LEVEL       = "info"
  LOG_FORMAT      = "json"
  CLICK_BUFFER    = "2048"
  SHUTDOWN_TIMEOUT_SECONDS = "20"
  # PUBLIC_BASE_URL set via `flyctl secrets`

[[mounts]]
  source      = "shortr_data"
  destination = "/data"
  initial_size = "1gb"
  snapshot_retention = 14  # days; default is 5

[http_service]
  internal_port      = 8080
  force_https        = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1     # keep 1 hot so redirects don't cold-start
  processes          = ["app"]

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 500

  [[http_service.checks]]
    interval = "15s"
    timeout  = "3s"
    grace_period = "10s"
    method = "GET"
    path   = "/healthz"

[[vm]]
  size      = "shared-cpu-1x"
  memory    = "256mb"
  cpu_kind  = "shared"
  cpus      = 1

[deploy]
  strategy = "rolling"

# Metrics — Fly's managed Prometheus scrapes this.
[metrics]
  port = 8080
  path = "/metrics"
