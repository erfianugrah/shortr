# Litestream replica config.
#
# Designed for Fly.io's Tigris S3-compatible storage. After
# `flyctl storage create`, the following env vars are set on the app:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION,
#   AWS_ENDPOINT_URL_S3, BUCKET_NAME
# Litestream picks them up automatically (note: AWS_ENDPOINT_URL_S3 is the
# Tigris endpoint, e.g. https://fly.storage.tigris.dev).

# Disable the metrics endpoint by default; uncomment to scrape per-DB stats.
# addr: ":9090"

dbs:
  - path: ${DB_PATH}
    replicas:
      - type: s3
        bucket: ${BUCKET_NAME}
        path: shortr
        region: ${AWS_REGION:-auto}
        endpoint: ${AWS_ENDPOINT_URL_S3}
        # Force-path-style is recommended for non-AWS S3-compatible providers.
        force-path-style: true
        # Sync interval — how often to flush WAL frames to remote storage.
        # Default 1s is fine for a URL shortener; tune lower if you have
        # higher write volume.
        sync-interval: 1s
        # Snapshot interval — full DB snapshot uploaded periodically. Older
        # snapshots are retained per the retention policy below.
        snapshot-interval: 24h
        # Keep 7 days of point-in-time recovery.
        retention: 168h
        retention-check-interval: 6h
