name: deploy

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

# One deploy at a time. Subsequent pushes wait.
concurrency: deploy-shortr

jobs:
  deploy:
    name: Deploy to Fly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Build + deploy
        run: flyctl deploy --config deploy/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
