name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      # Make web/dist/ exist so //go:embed succeeds even though the dashboard
      # isn't built in this job.
      - run: mkdir -p web/dist && touch web/dist/.gitkeep

      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -count=1 ./...

  web:
    name: Web build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bunx biome check
        working-directory: .

      - run: bun run build
